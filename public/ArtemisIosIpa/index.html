<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis引擎游戏分享</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #6b8cbc;
            --accent: #ff7e5f;
            --light: #ffffff;
            --light-gray: #f5f7fa;
            --gray: #e1e5eb;
            --dark-gray: #6c757d;
            --dark: #343a40;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--light-gray), var(--gray));
            color: var(--dark);
            min-height: 100vh;
            background-attachment: fixed;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 导航栏样式 */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(74, 111, 165, 0.2);
            box-shadow: var(--shadow);
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .logo i {
            font-size: 2.2rem;
            color: var(--accent);
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: var(--transition);
            position: relative;
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        .nav-links a.active {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: var(--transition);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        /* 页面内容样式 */
        .page {
            display: none;
            padding: 60px 0;
            animation: fadeIn 0.5s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page-title {
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.5rem;
            color: var(--primary);
            position: relative;
        }
        
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
        }
        
        /* 首页样式 */
        .hero {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .hero p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--dark-gray);
        }
        
        /* 下载页样式 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(74, 111, 165, 0.1);
        }
        
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-color: rgba(74, 111, 165, 0.2);
        }
        
        .game-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid var(--primary);
        }
        
        .game-info {
            padding: 20px;
        }
        
        .game-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .game-author {
            color: var(--dark-gray);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .game-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .game-link:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        
        /* 作者页样式 */
        .author-container {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            align-items: center;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .author-avatar {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }
        
        .avatar-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--primary);
            box-shadow: var(--shadow);
        }
        
        .author-info {
            flex: 2;
            min-width: 300px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        .author-info h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .author-info p {
            margin-bottom: 15px;
            color: var(--dark-gray);
        }
        
        /* 友情链接页样式 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .link-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(74, 111, 165, 0.1);
            box-shadow: var(--shadow);
        }
        
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: rgba(74, 111, 165, 0.2);
        }
        
        .link-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }
        
        .link-card h3 {
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .link-card a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .link-card a:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        
        /* 页脚样式 */
        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
            border-top: 1px solid rgba(74, 111, 165, 0.2);
            color: var(--dark-gray);
            font-size: 0.9rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 10px;
            }
            
            .nav-links a {
                padding: 6px 10px;
                font-size: 0.9rem;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .author-container {
                flex-direction: column;
            }
        }
        
        @media (max-width: 480px) {
            nav {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                padding: 20px;
            }
        }
        
        /* 加载动画 */
        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        
        .loader .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(74, 111, 165, 0.2);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            background: #fff;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <i class="fas fa-gamepad"></i>
                    <span>Artemis引擎</span>
                </div>
                <div class="nav-links">
                    <a href="#" class="nav-link active" data-page="home">首页</a>
                    <a href="#" class="nav-link" data-page="download">游戏下载</a>
                    <a href="#" class="nav-link" data-page="author">关于作者</a>
                    <a href="#" class="nav-link" data-page="links">友情链接</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 页面容器 -->
    <main class="container">
        <!-- 首页 -->
        <section id="home" class="page active">
            <h1 class="page-title">Artemis引擎游戏分享</h1>
            <div class="hero">
                <p>分享基于Artemis引擎的iOS直装游戏资源</p>
            </div>
        </section>

        <!-- 下载页 -->
        <section id="download" class="page">
            <h1 class="page-title">游戏资源下载</h1>
            <div class="games-grid" id="games-container">
                <!-- 游戏卡片将通过JS动态加载 -->
                <div class="loader">
                    <div class="spinner"></div>
                </div>
            </div>
        </section>

        <!-- 作者页 -->
        <section id="author" class="page">
            <h1 class="page-title">关于作者</h1>
            <div class="author-container">
                <div class="author-avatar">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=500&q=80" alt="作者头像" class="avatar-img">
                </div>
                <div class="author-info">
                    <h2>关于我</h2>
                    <p>欢迎来到我的Artemis引擎游戏分享站。</p>
                    <p>这里提供精选的iOS直装游戏资源。</p>
                </div>
            </div>
        </section>

        <!-- 友情链接页 -->
        <section id="links" class="page">
            <h1 class="page-title">友情链接</h1>
            <div class="links-grid">
                <div class="link-card">
                    <i class="fas fa-book"></i>
                    <h3>Artemis官方文档</h3>
                    <a href="#">查看文档</a>
                </div>
                <div class="link-card">
                    <i class="fas fa-users"></i>
                    <h3>移植者社区</h3>
                    <a href="#">加入社区</a>
                </div>
                <div class="link-card">
                    <i class="fas fa-store"></i>
                    <h3>iOS游戏商店</h3>
                    <a href="#">浏览游戏</a>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>© 2023 Artemis引擎游戏分享 | 本网站仅用于技术交流</p>
            <p>本站资源仅供学习研究使用</p>
        </div>
    </footer>

    <script>
        // 页面导航功能
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 更新活动链接
                document.querySelectorAll('.nav-link').forEach(el => {
                    el.classList.remove('active');
                });
                this.classList.add('active');
                
                // 显示对应页面
                const pageId = this.getAttribute('data-page');
                document.querySelectorAll('.page').forEach(page => {
                    page.classList.remove('active');
                });
                document.getElementById(pageId).classList.add('active');
                
                // 如果是下载页且尚未加载数据，则加载游戏数据
                if (pageId === 'download' && !window.gamesLoaded) {
                    loadGames();
                    window.gamesLoaded = true;
                }
            });
        });
        
        // 从JSON加载游戏数据
        async function loadGames() {
            const gamesContainer = document.getElementById('games-container');
            gamesContainer.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('https://gist.githubusercontent.com/sunxibing114514/6765a886b1718459a470c5743fdb31bc/raw/0a86c3dc018be1a854e0889636db9adc1f5907dc/games.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const games = await response.json();
                renderGames(games);
            } catch (error) {
                console.error('加载游戏数据失败:', error);
                gamesContainer.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <h3>无法加载游戏数据</h3>
                        <p>${error.message || '请检查网络连接后刷新页面重试'}</p>
                    </div>
                `;
            }
        }
        
        // 渲染游戏列表
        function renderGames(games) {
            const gamesContainer = document.getElementById('games-container');
            gamesContainer.innerHTML = '';
            
            if (games.length === 0) {
                gamesContainer.innerHTML = '<p class="error-message">暂无游戏资源</p>';
                return;
            }
            
            games.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                gameCard.innerHTML = `
                    <img src="${game.image}" alt="${game.name}" class="game-image" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
                    <div class="game-info">
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-author">移植作者: ${game.port_author}</p>
                        <p class="game-author">直装作者: ${game.install_author}</p>
                        <a href="${game.link}" class="game-link" target="_blank">下载游戏</a>
                    </div>
                `;
                gamesContainer.appendChild(gameCard);
            });
        }
        
        // 初始化页面
        window.gamesLoaded = false;
    </script>
</body>
</html>
