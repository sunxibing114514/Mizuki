<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RM2k/2k3 可视化存档修改器</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --header-bg: #e0e5ec;
            --border: #d1d9e6;
            --primary: #4a90e2;
            --text: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        
        .container { width: 800px; background: var(--panel); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        
        .header { background: var(--header-bg); padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header h2 { margin: 0; color: #2c3e50; font-size: 1.2rem; }
        
        .toolbar { padding: 15px; background: #fafafa; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        
        /* 表格样式 */
        .editor-table { width: 100%; border-collapse: collapse; }
        .editor-table th, .editor-table td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #eee; }
        .editor-table th { background-color: #f8f9fa; color: #666; font-weight: 600; width: 40%; }
        .editor-table tr:hover { background-color: #f1f8ff; }
        
        /* 输入控件样式 */
        input[type="text"], input[type="number"] {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
        
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #357abd; }
        .btn-secondary { background: #e2e6ea; color: #555; }
        .btn-secondary:hover { background: #dbe2e8; }
        
        .section-title { background: #eee; font-weight: bold; color: #555; padding: 8px 20px; font-size: 0.9rem; letter-spacing: 1px; }
        
        #status { font-size: 12px; color: #666; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>RM2k/2k3 存档编辑器</h2>
        <span id="fileNameDisplay" style="font-size: 0.9rem; color: #666;">未加载文件</span>
    </div>

    <div class="toolbar">
        <input type="file" id="fileInput" accept=".lsd" style="display:none" onchange="loadFile()">
        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📂 打开存档</button>
        <button class="btn btn-primary" onclick="saveFile()">💾 保存修改</button>
        <span id="status"></span>
    </div>

    <div id="editorArea">
        <div style="padding: 40px; text-align: center; color: #999;">
            请点击左上角“打开存档”选择 .lsd 文件
        </div>
    </div>
</div>

<script>
/**
 * =========================================================
 * 1. LCF 核心引擎 (二进制解析/构建)
 * =========================================================
 */
const LcfUtils = {
    readBer: (view, offsetRef) => {
        let value = 0, byte;
        do {
            byte = view.getUint8(offsetRef.current++);
            value = (value << 7) | (byte & 0x7F);
        } while (byte & 0x80);
        return value;
    },
    writeBer: (value) => {
        const bytes = [];
        if (value === 0) return [0];
        let temp = value;
        while (temp > 0) {
            let byte = temp & 0x7F;
            temp >>= 7;
            if (bytes.length > 0) byte |= 0x80;
            bytes.unshift(byte);
        }
        return bytes;
    },
    readString: (view, offsetRef, length) => {
        let str = "";
        for (let i = 0; i < length; i++) 
            str += String.fromCharCode(view.getUint8(offsetRef.current++));
        return str; // 仅支持 ASCII/UTF-8，中文可能显示乱码，但不影响数值修改
    },
    writeString: (str) => {
        const bytes = [];
        for (let i = 0; i < str.length; i++) bytes.push(str.charCodeAt(i) & 0xFF);
        return bytes;
    }
};

// 定义我们需要提取和展示的数据结构
const Schema = {
    // 根节点
    root: {
        0x64: { key: 'Title', type: 'chunk', schema: 'title' },
        0x65: { key: 'System', type: 'chunk', schema: 'system' }
    },
    // 标题信息
    title: {
        0x01: { key: 'HeroName', label: '主角姓名 (存档显示)', type: 'string' },
        0x02: { key: 'HeroLevel', label: '主角等级 (存档显示)', type: 'int' },
        0x03: { key: 'HeroHP', label: '主角 HP (存档显示)', type: 'int' },
        0x0B: { key: 'FaceFile', label: '头像文件名', type: 'string' },
    },
    // 系统信息
    system: {
        0x11: { key: 'Graphic', label: '系统界面图 (System)', type: 'string' },
        0x1F: { key: 'Gold', label: '持有金钱 (Gold)', type: 'int' },
        0x20: { key: 'SaveCount', label: '存档次数', type: 'int' },
        0x17: { key: 'BattleCount', label: '战斗胜利次数', type: 'int' } // 部分版本有效
    }
};

let rawData = null; // 存储解析后的 JSON 对象
let originalBuffer = null; // 存储原始文件，用于回写未修改部分

// 解析器
class LcfParser {
    constructor(buffer) {
        this.view = new DataView(buffer);
        this.offset = { current: 0 };
    }
    parse() {
        const headerLen = LcfUtils.readBer(this.view, this.offset);
        const headerStr = LcfUtils.readString(this.view, this.offset, headerLen);
        if (headerStr !== "LcfSaveData") throw new Error("非有效 RM2k 存档");
        
        return {
            header: headerStr,
            content: this.parseChunk(Schema.root, this.view.byteLength)
        };
    }
    parseChunk(schemaDef, endLimit) {
        const res = {};
        while (this.offset.current < endLimit) {
            const id = LcfUtils.readBer(this.view, this.offset);
            if (id === 0) break;
            const len = LcfUtils.readBer(this.view, this.offset);
            const nextOffset = this.offset.current + len;

            // 查找 Schema 定义
            const def = schemaDef[id];
            if (def) {
                if (def.type === 'int') {
                    res[def.key] = LcfUtils.readBer(this.view, this.offset);
                } else if (def.type === 'string') {
                    res[def.key] = LcfUtils.readString(this.view, this.offset, len);
                } else if (def.type === 'chunk') {
                    res[def.key] = this.parseChunk(Schema[def.schema], nextOffset);
                }
            } else {
                // 保留未知数据
                const raw = new Uint8Array(this.view.buffer.slice(this.offset.current, nextOffset));
                res[`_raw_${id}`] = raw;
            }
            this.offset.current = nextOffset;
        }
        return res;
    }
}

// 写入器
class LcfWriter {
    constructor() { this.buffer = []; }
    push(arr) { for(let b of arr) this.buffer.push(b); }
    
    write(data) {
        const hBytes = LcfUtils.writeString(data.header);
        this.push(LcfUtils.writeBer(hBytes.length));
        this.push(hBytes);
        this.writeChunk(data.content, Schema.root);
    }
    
    writeChunk(data, schemaDef) {
        // 先建立 ID 映射表方便查找
        const keyToId = {};
        for(let id in schemaDef) keyToId[schemaDef[id].key] = { id: parseInt(id), def: schemaDef[id] };

        for (let key in data) {
            let id = null, bytes = [];
            const val = data[key];

            if (keyToId[key]) {
                const meta = keyToId[key];
                id = meta.id;
                if (meta.def.type === 'int') bytes = LcfUtils.writeBer(val);
                else if (meta.def.type === 'string') bytes = LcfUtils.writeString(val);
                else if (meta.def.type === 'chunk') {
                    const subWriter = new LcfWriter();
                    subWriter.writeChunk(val, Schema[meta.def.schema]);
                    bytes = subWriter.buffer;
                }
            } else if (key.startsWith('_raw_')) {
                id = parseInt(key.split('_')[2]);
                bytes = Array.from(val);
            }

            if (id !== null) {
                this.push(LcfUtils.writeBer(id));
                this.push(LcfUtils.writeBer(bytes.length));
                this.push(bytes);
            }
        }
        this.push([0]); // End of chunk
    }
}

/**
 * =========================================================
 * 2. GUI 交互逻辑
 * =========================================================
 */

function loadFile() {
    const input = document.getElementById('fileInput');
    if (!input.files[0]) return;
    
    const file = input.files[0];
    document.getElementById('fileNameDisplay').innerText = file.name;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            originalBuffer = e.target.result;
            const parser = new LcfParser(originalBuffer);
            rawData = parser.parse();
            renderTable();
            document.getElementById('status').innerText = "加载成功";
            document.getElementById('status').style.color = "green";
        } catch (err) {
            alert("解析失败: " + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
}

// 扁平化数据以供表格显示
const tableMapping = [
    { title: "基础信息 (存档菜单显示)", items: [
        { path: ['Title', 'HeroName'], label: '主角名字', type: 'text' },
        { path: ['Title', 'HeroLevel'], label: '显示等级', type: 'number' },
        { path: ['Title', 'HeroHP'],    label: '显示 HP', type: 'number' }
    ]},
    { title: "系统数据", items: [
        { path: ['System', 'Gold'],      label: '💰 金钱 (Gold)', type: 'number' },
        { path: ['System', 'SaveCount'], label: '💾 存档次数', type: 'number' },
        { path: ['System', 'BattleCount'], label: '⚔️ 战斗胜利次数', type: 'number' },
        { path: ['System', 'Graphic'],   label: '🖼️ 窗口皮肤文件', type: 'text' }
    ]}
];

function renderTable() {
    const container = document.getElementById('editorArea');
    container.innerHTML = "";
    
    const table = document.createElement('table');
    table.className = "editor-table";
    
    tableMapping.forEach(section => {
        // Section Header
        const headerRow = table.insertRow();
        const headerCell = headerRow.insertCell();
        headerCell.colSpan = 2;
        headerCell.className = "section-title";
        headerCell.innerText = section.title;

        // Rows
        section.items.forEach(item => {
            const row = table.insertRow();
            
            // Label
            const labelCell = row.insertCell();
            labelCell.innerText = item.label;
            
            // Input
            const valCell = row.insertCell();
            const input = document.createElement('input');
            input.type = item.type;
            
            // 获取当前值
            let val = rawData.content;
            let exists = true;
            for (let p of item.path) {
                if (val && val[p] !== undefined) val = val[p];
                else { exists = false; break; }
            }
            
            if (exists) {
                input.value = val;
                input.onchange = (e) => updateValue(item.path, e.target.value, item.type);
            } else {
                input.value = "";
                input.placeholder = "未在存档中找到此数据";
                input.disabled = true;
            }
            
            valCell.appendChild(input);
        });
    });
    
    container.appendChild(table);
}

function updateValue(path, value, type) {
    if (!rawData) return;
    let target = rawData.content;
    
    // 遍历到倒数第二个节点
    for (let i = 0; i < path.length - 1; i++) {
        target = target[path[i]];
    }
    
    // 转换类型并赋值
    const lastKey = path[path.length - 1];
    if (type === 'number') {
        target[lastKey] = parseInt(value) || 0;
    } else {
        target[lastKey] = value;
    }
}

function saveFile() {
    if (!rawData) return;
    try {
        const writer = new LcfWriter();
        writer.write(rawData);
        
        const u8 = new Uint8Array(writer.buffer);
        const blob = new Blob([u8], {type: "application/octet-stream"});
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.download = "edited_" + (document.getElementById('fileInput').files[0].name || "save.lsd");
        link.click();
        
        document.getElementById('status').innerText = "保存并下载成功！";
    } catch (e) {
        alert("保存失败: " + e.message);
    }
}
</script>

</body>
</html>
