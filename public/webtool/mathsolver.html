<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级数学求解器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4a6bff;
            --primary-dark: #3a5bef;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --light: #f8f9fa;
            --dark: #343a40;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(74, 107, 255, 0.3);
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
        }

        .header .version {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 侧边栏 */
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            height: fit-content;
        }

        .sidebar h2 {
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light);
            font-size: 1.4rem;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-item:hover {
            background: #e9ecef;
        }

        .category-item.active {
            background: var(--primary);
            color: white;
        }

        .category-item i {
            width: 20px;
            text-align: center;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 输入区 */
        .input-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-header h2 {
            color: var(--dark);
            font-size: 1.5rem;
        }

        .input-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 8px 20px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .math-editor {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            font-size: 1.2rem;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.6;
        }

        .math-editor:focus {
            outline: none;
            border-color: var(--primary);
        }

        .symbols-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .symbol-btn {
            padding: 12px 5px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            font-family: 'Cambria Math', 'STIX Two Math', serif;
        }

        .symbol-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .symbol-btn.operator {
            background: #e8f4ff;
            border-color: #b6d4fe;
        }

        .symbol-btn.function {
            background: #f0f9ff;
            border-color: #b6e3fe;
        }

        .symbol-btn.matrix {
            background: #f8f9fc;
            border-color: #d0d7e7;
        }

        /* 高级输入区 */
        .advanced-input {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .matrix-input {
            margin-bottom: 20px;
        }

        .matrix-editor {
            display: inline-block;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            background: #f8f9fa;
        }

        .matrix-row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .matrix-row:last-child {
            margin-bottom: 0;
        }

        .matrix-cell {
            width: 60px;
            height: 40px;
            text-align: center;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 1rem;
        }

        .matrix-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-large {
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        /* 结果区 */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .result-card h3 {
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light);
            font-size: 1.3rem;
        }

        .result-content {
            font-family: 'Cambria Math', 'STIX Two Math', serif;
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 100px;
        }

        .result-content.math {
            font-size: 1.2rem;
            color: var(--dark);
        }

        .graph-container {
            width: 100%;
            height: 300px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .steps-list {
            list-style: none;
        }

        .step-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
        }

        .practice-list {
            list-style: decimal;
            padding-left: 20px;
        }

        .practice-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .symbols-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
            
            .symbols-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <script>
        // 主应用代码
        document.addEventListener('DOMContentLoaded', function() {

    <script>
        // 主应用类
        class MathSolver {
            constructor() {
                this.math = math;
                this.setupCustomFunctions();
            }
            
            setupCustomFunctions() {
                // 扩展math.js功能
                const self = this;
                
                // 求解方程（一元一次、一元二次）
                math.solveEquation = function(equation) {
                    try {
                        if (!equation.includes('=')) {
                            return { error: '无效的方程格式' };
                        }
                        
                        const [left, right] = equation.split('=');
                        const expr = math.simplify(`${left} - (${right})`);
                        const poly = math.polynomial(expr.toString());
                        
                        if (poly.coefficients.length === 2) {
                            // 一元一次方程: ax + b = 0
                            const a = poly.coefficients[1];
                            const b = poly.coefficients[0];
                            return { type: 'linear', solution: -b / a };
                        } else if (poly.coefficients.length === 3) {
                            // 一元二次方程: ax² + bx + c = 0
                            const a = poly.coefficients[2];
                            const b = poly.coefficients[1];
                            const c = poly.coefficients[0];
                            const discriminant = b * b - 4 * a * c;
                            
                            if (discriminant > 0) {
                                const x1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                                const x2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                                return { 
                                    type: 'quadratic', 
                                    solutions: [x1, x2],
                                    discriminant: discriminant
                                };
                            } else if (Math.abs(discriminant) < 1e-10) {
                                const x = -b / (2 * a);
                                return { 
                                    type: 'quadratic', 
                                    solutions: [x],
                                    discriminant: 0
                                };
                            } else {
                                const real = -b / (2 * a);
                                const imag = Math.sqrt(-discriminant) / (2 * a);
                                return { 
                                    type: 'quadratic', 
                                    solutions: [
                                        { re: real, im: imag },
                                        { re: real, im: -imag }
                                    ],
                                    discriminant: discriminant
                                };
                            }
                        } else {
                            return { error: '只支持一元一次和一元二次方程' };
                        }
                    } catch (e) {
                        return { error: e.message };
                    }
                };
                
                // 求解线性方程组
                math.solveLinearSystem = function(A, b) {
                    try {
                        // A是系数矩阵，b是常数向量
                        const A_inv = math.inv(A);
                        const x = math.multiply(A_inv, b);
                        return x;
                    } catch (e) {
                        return { error: e.message };
                    }
                };
                
                // 数值积分（辛普森法）
                math.integrate = function(f, a, b, n = 1000) {
                    const h = (b - a) / n;
                    let sum = f(a) + f(b);
                    
                    for (let i = 1; i < n; i++) {
                        const x = a + i * h;
                        sum += f(x) * (i % 2 === 0 ? 2 : 4);
                    }
                    
                    return sum * h / 3;
                };
                
                // 数值求导
                math.derivative = function(f, x, h = 1e-5) {
                    return (f(x + h) - f(x - h)) / (2 * h);
                };
                
                // 极限
                math.limit = function(f, x, direction = 0) {
                    const h = 1e-6;
                    if (direction === 0) {
                        return (f(x + h) + f(x - h)) / 2;
                    } else if (direction > 0) {
                        return f(x + h);
                    } else {
                        return f(x - h);
                    }
                };
            }
            
            // 主求解函数
            solve(expression, options = {}) {
                const result = {
                    input: expression,
                    type: this.detectProblemType(expression),
                    solution: null,
                    steps: [],
                    error: null
                };
                
                try {
                    switch(result.type) {
                        case 'expression':
                            result.solution = math.evaluate(expression);
                            result.steps = [`计算: ${expression} = ${result.solution}`];
                            break;
                            
                        case 'equation':
                            const eqResult = math.solveEquation(expression);
                            if (eqResult.error) {
                                result.error = eqResult.error;
                            } else {
                                result.solution = eqResult;
                                result.steps = this.getEquationSteps(expression, eqResult);
                            }
                            break;
                            
                        case 'derivative':
                            const func = expression.replace(/^d\/dx\s*\(?|\)$/g, '');
                            const f = x => math.evaluate(func, { x });
                            result.solution = math.derivative(f, 0);
                            result.steps = [
                                `求导: f(x) = ${func}`,
                                `f'(x) = ${this.getDerivative(func)}`,
                                `f'(0) = ${result.solution}`
                            ];
                            break;
                            
                        case 'integral':
                            const integralMatch = expression.match(/∫\s*(.+?)\s*d([a-z])/);
                            if (integralMatch) {
                                const integrand = integralMatch[1];
                                const variable = integralMatch[2];
                                result.solution = this.getIntegral(integrand, variable);
                                result.steps = [
                                    `求积分: ∫${integrand} d${variable}`,
                                    `原函数: ${result.solution}`
                                ];
                            }
                            break;
                            
                        case 'limit':
                            const limitMatch = expression.match(/lim_\{([a-z])→([^}]+)\}\s*(.+)/);
                            if (limitMatch) {
                                const variable = limitMatch[1];
                                const target = parseFloat(limitMatch[2]);
                                const funcStr = limitMatch[3];
                                const f = x => math.evaluate(funcStr, { [variable]: x });
                                result.solution = math.limit(f, target);
                                result.steps = [
                                    `求极限: lim(${funcStr}) 当 ${variable} → ${target}`,
                                    `结果: ${result.solution}`
                                ];
                            }
                            break;
                            
                        case 'matrix':
                            result.solution = this.processMatrix(expression);
                            break;
                            
                        default:
                            result.error = '无法识别的表达式类型';
                    }
                } catch (e) {
                    result.error = e.message;
                }
                
                return result;
            }
            
            detectProblemType(expr) {
                if (expr.includes('=')) return 'equation';
                if (expr.includes('d/dx') || expr.includes('导数')) return 'derivative';
                if (expr.includes('∫') || expr.includes('积分')) return 'integral';
                if (expr.includes('lim') || expr.includes('极限')) return 'limit';
                if (expr.includes('matrix') || expr.includes('det') || expr.includes('特征值')) return 'matrix';
                if (expr.includes('[') && expr.includes(']')) return 'matrix';
                return 'expression';
            }
            
            getEquationSteps(equation, result) {
                const steps = [`方程: ${equation}`];
                
                if (result.type === 'linear') {
                    steps.push('这是一元一次方程');
                    steps.push(`解: x = ${result.solution}`);
                } else if (result.type === 'quadratic') {
                    steps.push('这是一元二次方程');
                    steps.push(`判别式: Δ = ${result.discriminant}`);
                    
                    if (result.discriminant > 0) {
                        steps.push('Δ > 0，有两个实根');
                        steps.push(`x₁ = ${result.solutions[0]}`);
                        steps.push(`x₂ = ${result.solutions[1]}`);
                    } else if (Math.abs(result.discriminant) < 1e-10) {
                        steps.push('Δ = 0，有一个重根');
                        steps.push(`x = ${result.solutions[0]}`);
                    } else {
                        steps.push('Δ < 0，有两个共轭复根');
                        steps.push(`x₁ = ${result.solutions[0].re} + ${result.solutions[0].im}i`);
                        steps.push(`x₂ = ${result.solutions[1].re} + ${result.solutions[1].im}i`);
                    }
                }
                
                return steps;
            }
            
            getDerivative(expr) {
                // 简单的符号求导
                const rules = [
                    { pattern: /(\d+)([a-z])\^(\d+)/g, derivative: (match, p1, p2, p3) => 
                        `${p1 * p3}${p2}^${p3-1}` },
                    { pattern: /(\d+)?([a-z])/g, derivative: (match, p1, p2) => 
                        p1 ? p1 : '1' },
                    { pattern: /sin\(([^)]+)\)/g, derivative: (match, p1) => 
                        `cos(${p1})` },
                    { pattern: /cos\(([^)]+)\)/g, derivative: (match, p1) => 
                        `-sin(${p1})` },
                    { pattern: /tan\(([^)]+)\)/g, derivative: (match, p1) => 
                        `sec^2(${p1})` },
                    { pattern: /e\^([a-z])/g, derivative: (match, p1) => 
                        `e^${p1}` },
                    { pattern: /ln\(([^)]+)\)/g, derivative: (match, p1) => 
                        `1/${p1}` }
                ];
                
                let derivative = expr;
                rules.forEach(rule => {
                    derivative = derivative.replace(rule.pattern, rule.derivative);
                });
                
                return derivative;
            }
            
            getIntegral(expr, variable) {
                // 简单的符号积分
                const integralRules = [
                    { pattern: /(\d+)?([a-z])(?:\^(\d+))?/, integral: (match, p1, p2, p3) => {
                        const coeff = p1 ? parseFloat(p1) : 1;
                        const power = p3 ? parseInt(p3) : 1;
                        return `${coeff/(power+1)}${variable}^${power+1}`;
                    }},
                    { pattern: /sin\(([^)]+)\)/, integral: (match, p1) => 
                        `-cos(${p1})` },
                    { pattern: /cos\(([^)]+)\)/, integral: (match, p1) => 
                        `sin(${p1})` },
                    { pattern: /e\^([a-z])/, integral: (match, p1) => 
                        `e^${p1}` },
                    { pattern: /1\/([a-z])/, integral: (match, p1) => 
                        `ln|${p1}|` }
                ];
                
                let integral = '';
                integralRules.forEach(rule => {
                    if (expr.match(rule.pattern)) {
                        integral = expr.replace(rule.pattern, rule.integral);
                    }
                });
                
                return integral ? integral + ' + C' : '无法找到原函数';
            }
            
            processMatrix(expr) {
                try {
                    if (expr.startsWith('det')) {
                        const matrixStr = expr.match(/\[(.*?)\]/)[0];
                        const matrix = math.evaluate(matrixStr);
                        return math.det(matrix);
                    } else if (expr.includes('特征值')) {
                        const matrixStr = expr.match(/\[(.*?)\]/)[0];
                        const matrix = math.evaluate(matrixStr);
                        const eig = math.eigs(matrix);
                        return { eigenvalues: eig.values, eigenvectors: eig.vectors };
                    } else {
                        return math.evaluate(expr);
                    }
                } catch (e) {
                    return { error: e.message };
                }
            }
            
            // 矩阵运算
            matrixOperation(operation, matrixA, matrixB = null) {
                try {
                    const A = math.matrix(matrixA);
                    let result;
                    
                    switch(operation) {
                        case 'add':
                            const B = math.matrix(matrixB);
                            result = math.add(A, B);
                            break;
                        case 'multiply':
                            const C = math.matrix(matrixB);
                            result = math.multiply(A, C);
                            break;
                        case 'inverse':
                            result = math.inv(A);
                            break;
                        case 'transpose':
                            result = math.transpose(A);
                            break;
                        case 'determinant':
                            result = math.det(A);
                            break;
                        case 'eigenvalues':
                            const eig = math.eigs(A);
                            result = { eigenvalues: eig.values, eigenvectors: eig.vectors };
                            break;
                        default:
                            return { error: '未知的矩阵运算' };
                    }
                    
                    return { success: true, result };
                } catch (e) {
                    return { error: e.message };
                }
            }
            
            // 统计计算
            statistics(data, operation) {
                try {
                    switch(operation) {
                        case 'mean':
                            return math.mean(data);
                        case 'median':
                            return math.median(data);
                        case 'std':
                            return math.std(data);
                        case 'variance':
                            return math.variance(data);
                        case 'sum':
                            return math.sum(data);
                        case 'min':
                            return math.min(data);
                        case 'max':
                            return math.max(data);
                        default:
                            return { error: '未知的统计运算' };
                    }
                } catch (e) {
                    return { error: e.message };
                }
            }

            solveSystem() {
                const equations = [];
                const equationRows = document.querySelectorAll('#system-input .equation-row');
                
                equationRows.forEach(row => {
                    const inputs = row.querySelectorAll('.equation-input');
                    if (inputs.length === 2) {
                        const left = inputs[0].value.trim();
                        const right = inputs[1].value.trim();
                        if (left && right) {
                            equations.push(`${left} = ${right}`);
                        }
                    }
                });
                
                if (equations.length === 0) {
                    alert('请输入方程组！');
                    return;
                }
                
                // 解析方程组
                const systemResult = this.parseAndSolveSystem(equations);
                this.displaySystemResult(systemResult);
            }
            
            parseAndSolveSystem(equations) {
                // 简化的线性方程组求解
                // 实际应用中需要更复杂的解析
                try {
                    if (equations.length === 2) {
                        // 尝试解析两个方程
                        const eq1 = equations[0];
                        const eq2 = equations[1];
                        
                        // 提取系数（简化版，实际需要更复杂的解析）
                        const coeffs = this.extractCoefficients([eq1, eq2]);
                        
                        if (coeffs) {
                            const A = coeffs.A;
                            const b = coeffs.b;
                            
                            try {
                                const solution = math.lusolve(A, b);
                                return {
                                    type: 'linear',
                                    solution: solution,
                                    equations: equations,
                                    matrixA: A,
                                    vectorB: b
                                };
                            } catch (e) {
                                return { error: '无法求解方程组: ' + e.message };
                            }
                        }
                    }
                    
                    return { 
                        equations: equations,
                        message: '方程组解析完成，需要更复杂的求解器处理非线性系统'
                    };
                } catch (e) {
                    return { error: e.message };
                }
            }
            
            extractCoefficients(equations) {
                // 简化的系数提取（仅处理形如 ax + by = c 的方程）
                const vars = ['x', 'y', 'z'];
                const A = [];
                const b = [];
                
                equations.forEach(eq => {
                    const [left, right] = eq.split('=');
                    const coeffs = vars.map(v => {
                        const regex = new RegExp(`([+-]?\\s*\\d*\\.?\\d*)\\s*\\*?\\s*${v}(?!\\w)`);
                        const match = left.match(regex);
                        if (match) {
                            let coeff = match[1].replace(/\s+/g, '');
                            if (coeff === '' || coeff === '+') coeff = '1';
                            if (coeff === '-') coeff = '-1';
                            return parseFloat(coeff) || 0;
                        }
                        return 0;
                    });
                    
                    A.push(coeffs);
                    b.push([parseFloat(right) || 0]);
                });
                
                return { A, b };
            }
            
            displaySystemResult(result) {
                const output = document.getElementById('result-output');
                
                if (result.error) {
                    output.innerHTML = `<div class="error">错误: ${result.error}</div>`;
                    return;
                }
                
                let html = '<div class="system-solution">';
                html += `<h4>方程组:</h4><ul>`;
                
                result.equations.forEach(eq => {
                    html += `<li>${eq}</li>`;
                });
                
                html += '</ul>';
                
                if (result.type === 'linear' && result.solution) {
                    html += `<h4>解:</h4>`;
                    const vars = ['x', 'y', 'z'];
                    
                    result.solution._data.forEach((value, index) => {
                        html += `<p>${vars[index] || `x${index+1}`} = ${value}</p>`;
                    });
                    
                    html += `<h4>系数矩阵 A:</h4><pre>${JSON.stringify(result.matrixA, null, 2)}</pre>`;
                    html += `<h4>常数向量 b:</h4><pre>${JSON.stringify(result.vectorB, null, 2)}</pre>`;
                } else {
                    html += `<p>${result.message}</p>`;
                }
                
                html += '</div>';
                output.innerHTML = html;
            }
            
            solveProblem() {
                const input = this.mathInput.value.trim();
                
                if (!input) {
                    alert('请输入数学表达式！');
                    return;
                }
                
                const result = this.solver.solve(input);
                this.displayResult(result);
                
                // 生成相关练习题
                this.generatePracticeProblems();
            }
            
            displayResult(result) {
                const output = document.getElementById('result-output');
                const stepsOutput = document.getElementById('steps-output');
                
                if (result.error) {
                    output.innerHTML = `<div class="error" style="color: #dc3545; padding: 10px; background: #f8d7da; border-radius: 5px;">
                        <strong>错误:</strong> ${result.error}
                    </div>`;
                    stepsOutput.innerHTML = `<li class="step-item">计算过程中发生错误</li>`;
                    return;
                }
                
                // 显示结果
                let resultHtml = `<h4>输入: ${result.input}</h4>`;
                
                if (result.type === 'equation' && result.solution) {
                    if (result.solution.type === 'linear') {
                        resultHtml += `<p>方程类型: 一元一次方程</p>`;
                        resultHtml += `<p>解: x = ${result.solution.solution.toFixed(4)}</p>`;
                    } else if (result.solution.type === 'quadratic') {
                        resultHtml += `<p>方程类型: 一元二次方程</p>`;
                        resultHtml += `<p>判别式: Δ = ${result.solution.discriminant.toFixed(4)}</p>`;
                        
                        if (result.solution.discriminant > 0) {
                            resultHtml += `<p>有两个不同的实根:</p>`;
                            resultHtml += `<p>x₁ = ${result.solution.solutions[0].toFixed(4)}</p>`;
                            resultHtml += `<p>x₂ = ${result.solution.solutions[1].toFixed(4)}</p>`;
                        } else if (Math.abs(result.solution.discriminant) < 1e-10) {
                            resultHtml += `<p>有一个重根:</p>`;
                            resultHtml += `<p>x = ${result.solution.solutions[0].toFixed(4)}</p>`;
                        } else {
                            resultHtml += `<p>有两个共轭复根:</p>`;
                            resultHtml += `<p>x₁ = ${result.solution.solutions[0].re.toFixed(4)} + ${result.solution.solutions[0].im.toFixed(4)}i</p>`;
                            resultHtml += `<p>x₂ = ${result.solution.solutions[1].re.toFixed(4)} + ${result.solution.solutions[1].im.toFixed(4)}i</p>`;
                        }
                    }
                } else if (typeof result.solution === 'number') {
                    resultHtml += `<p>结果: ${result.solution}</p>`;
                } else if (result.solution !== null) {
                    resultHtml += `<p>结果: ${JSON.stringify(result.solution, null, 2)}</p>`;
                }
                
                output.innerHTML = resultHtml;
                
                // 显示步骤
                if (result.steps && result.steps.length > 0) {
                    stepsOutput.innerHTML = '';
                    result.steps.forEach((step, index) => {
                        const li = document.createElement('li');
                        li.className = 'step-item';
                        li.textContent = `步骤 ${index + 1}: ${step}`;
                        stepsOutput.appendChild(li);
                    });
                }
            }
            
            generatePracticeProblems() {
                const practiceOutput = document.getElementById('practice-output');
                const currentType = this.currentCategory;
                const problems = this.solver.generatePractice(currentType, 3);
                
                practiceOutput.innerHTML = '';
                problems.forEach((problem, index) => {
                    const li = document.createElement('li');
                    li.className = 'practice-item';
                    li.textContent = problem;
                    li.style.cursor = 'pointer';
                    li.addEventListener('click', () => {
                        this.mathInput.value = problem;
                        this.solveProblem();
                    });
                    practiceOutput.appendChild(li);
                });
            }
            
            plotGraph() {
                const input = this.mathInput.value.trim();
                if (!input) {
                    alert('请输入函数表达式！');
                    return;
                }
                
                try {
                    // 尝试绘制函数图形
                    const f = x => math.evaluate(input, { x });
                    const points = [];
                    
                    for (let x = -10; x <= 10; x += 0.1) {
                        try {
                            const y = f(x);
                            if (Math.abs(y) < 100) { // 限制y轴范围
                                points.push({x, y});
                            }
                        } catch (e) {
                            // 跳过无效点
                        }
                    }
                    
                    this.plotFunction(points, input);
                } catch (e) {
                    alert('无法绘制函数图形: ' + e.message);
                }
            }
            
            plotFunction(points, expression) {
                const ctx = document.getElementById('graph-canvas').getContext('2d');
                
                // 清除之前的图形
                if (window.myChart) {
                    window.myChart.destroy();
                }
                
                if (points.length === 0) {
                    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                    ctx.fillText('无有效数据点', 10, 20);
                    return;
                }
                
                const data = {
                    datasets: [{
                        label: `f(x) = ${expression}`,
                        data: points,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1
                    }]
                };
                
                const config = {
                    type: 'line',
                    data: data,
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: `函数图像: ${expression}`
                            },
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                position: 'bottom',
                                title: {
                                    display: true,
                                    text: 'x'
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: 'f(x)'
                                }
                            }
                        }
                    }
                };
                
                window.myChart = new Chart(ctx, config);
            }
            
            showSteps() {
                const input = this.mathInput.value.trim();
                if (!input) {
                    alert('请输入数学表达式！');
                    return;
                }
                
                this.solveProblem();
            }
            
            clearAll() {
                this.mathInput.value = '';
                document.getElementById('result-output').innerHTML = '等待计算...';
                document.getElementById('steps-output').innerHTML = '<li class="step-item">输入表达式后点击"计算求解"查看步骤</li>';
                
                if (window.myChart) {
                    window.myChart.destroy();
                }
            }
            
            loadExamples() {
                const examples = [
                    '2x + 5 = 13',
                    'x^2 - 4x + 4 = 0',
                    'sin(x) + cos(x)',
                    '∫(2x + 3) dx',
                    'd/dx (x^2 + 3x)',
                    'det([[1,2],[3,4]])',
                    'mean([1,2,3,4,5])'
                ];
                
                this.mathInput.placeholder = `例如: ${examples.join(', ')}`;
            }
        }
        
        // 图形绘制器
        class GraphPlotter {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.chart = null;
            }
            
            plot(f, xMin = -10, xMax = 10, step = 0.1) {
                const points = [];
                
                for (let x = xMin; x <= xMax; x += step) {
                    try {
                        const y = f(x);
                        if (!isNaN(y) && isFinite(y)) {
                            points.push({x, y});
                        }
                    } catch (e) {
                        // 跳过无效点
                    }
                }
                
                this.draw(points);
            }
            
            draw(points) {
                if (this.chart) {
                    this.chart.destroy();
                }
                
                const data = {
                    datasets: [{
                        label: '函数图像',
                        data: points,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.1
                    }]
                };
                
                const config = {
                    type: 'line',
                    data: data,
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: true
                            }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                position: 'bottom'
                            },
                            y: {
                                type: 'linear'
                            }
                        }
                    }
                };
                
                this.chart = new Chart(this.ctx, config);
            }
        }
    </script>
</body>
</html>
