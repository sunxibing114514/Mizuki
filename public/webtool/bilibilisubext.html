<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili字幕处理工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        input, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            max-width: 400px;
        }

        button {
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }

        .checkbox-container {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            input, button {
                font-size: 14px;
                padding: 8px;
            }

            h2 {
                font-size: 18px;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Bilibili字幕处理工具</h2>
    
    <!-- 文件上传区域 -->
    <div class="input-group">
        <input type="file" id="jsonUpload" accept=".json">
        <p>支持上传JSON格式字幕文件</p>
    </div>

    <!-- 显示区域 -->
    <div>
        <textarea id="subtitleDisplay" readonly placeholder="字幕内容将显示在这里"></textarea>
        <div class="checkbox-container">
            <input type="checkbox" id="lineBreak"> 
            <label for="lineBreak">每行独立显示</label>
        </div>
    </div>

    <!-- 示例按钮 -->
    <button onclick="showExample()">查看示例JSON</button>

    <!-- 功能按钮 -->
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="downloadTxt()">下载TXT</button>
        <button onclick="downloadSrt()">下载SRT</button>
        <button onclick="getBilibiliSubtitle()">获取B站字幕</button>
    </div>

    <!-- Bilibili链接输入 -->
    <div style="margin-top: 20px;">
        <input type="text" id="bilibiliUrl" placeholder="输入Bilibili视频链接">
    </div>
</div>

<!-- 示例模态框 -->
<div id="exampleModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeExample()">&times;</span>
        <pre id="exampleContent">
{
  "body": [
    {"from":0,"to":2,"content":"欢迎来到"},
    {"from":2,"to":4,"content":"示例字幕"}
  ]
}
        </pre>
    </div>
</div>

<script>
// 响应式设计变量
const isMobile = window.innerWidth <= 600;

// 显示示例JSON
function showExample() {
    const modal = document.getElementById("exampleModal");
    const span = document.getElementsByClassName("close")[0];
    modal.style.display = "block";
    
    span.onclick = function() {
        modal.style.display = "none";
    }
    
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
}

// 关闭示例模态框
function closeExample() {
    document.getElementById("exampleModal").style.display = "none";
}

// 处理文件上传
document.getElementById('jsonUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const json = JSON.parse(e.target.result);
            displaySubtitles(json.body);
        } catch(err) {
            alert('无效的JSON文件');
        }
    };
    
    reader.readAsText(file);
});

// 显示字幕内容
function displaySubtitles(subtitles) {
    let content = '';
    subtitles.forEach(sub => {
        content += sub.content;
        if (document.getElementById('lineBreak').checked) {
            content += '\n';
        } else {
            content += ' ';
        }
    });
    document.getElementById('subtitleDisplay').value = content;
}

// 下载TXT文件
function downloadTxt() {
    const content = document.getElementById('subtitleDisplay').value;
    const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
    saveAs(blob, "subtitles.txt");
}

// 生成SRT内容
function generateSrt(subtitles) {
    let srt = '';
    subtitles.forEach((sub, index) => {
        const start = convertTime(sub.from);
        const end = convertTime(sub.to);
        srt += `${index + 1}\n${start} --> ${end}\n${sub.content}\n\n`;
    });
    return srt;
}

// 时间格式转换（秒 → SRT格式）
function convertTime(seconds) {
    const date = new Date(seconds * 1000);
    const h = date.getUTCHours().toString().padStart(2, '0');
    const m = date.getUTCMinutes().toString().padStart(2, '0');
    const s = date.getUTCSeconds().toString().padStart(2, '0');
    const ms = date.getUTCMilliseconds().toString().padStart(3, '0');
    return `${h}:${m}:${s},${ms}`;
}

// 下载SRT文件
function downloadSrt() {
    const subtitles = extractSubtitles();
    if (subtitles.length === 0) {
        alert('没有可用的字幕内容');
        return;
    }
    
    const srtContent = generateSrt(subtitles);
    const blob = new Blob([srtContent], {type: "text/plain;charset=utf-8"});
    saveAs(blob, "subtitles.srt");
}

// 提取字幕数据
function extractSubtitles() {
    const displayValue = document.getElementById('subtitleDisplay').value;
    return displayValue.split('\n').filter(line => line.trim() !== '');
}

// 下载Bilibili字幕（演示版本）
function getBilibiliSubtitle() {
    const url = document.getElementById('bilibiliUrl').value;
    const bvid = url.split('BV')[1];
    
    // 模拟API请求（实际使用时需要后端代理）
    fetch(`https://api.bilibili.com/x/player/pagelist?bvid=${bvid}`)
        .then(response => response.json())
        .then(data => {
            const cid = data.data[0].cid;
            alert(`获取到cid: ${cid}\n请使用专用工具下载字幕`);
        })
        .catch(error => console.error('Error:', error));
}

// 文件保存辅助函数
function saveAs(blob, filename) {
    if (window.navigator.msSaveOrOpenBlob) {
        navigator.msSaveBlob(blob, filename);
    } else {
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
}

// 初始化界面
function init() {
    // 根据屏幕尺寸调整布局
    const container = document.querySelector('.container');
    if (isMobile) {
        container.style.padding = '10px';
    } else {
        container.style.padding = '20px';
    }
}

// 页面加载时初始化
window.addEventListener('load', init);
window.addEventListener('resize', () => {
    isMobile = window.innerWidth <= 600;
    init();
});
</script>
</body>
</html>
