<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bilibili字幕处理工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #exampleModal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            min-height: 300px;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Bilibili字幕处理工具</h2>
    
    <!-- 文件上传区域 -->
    <div>
        <input type="file" id="jsonUpload" accept=".json">
        <p>支持上传JSON格式字幕文件</p>
    </div>

    <!-- 显示区域 -->
    <div>
        <textarea id="subtitleDisplay" readonly style="width:100%; height:200px; padding:10px;"></textarea>
        <div>
            <input type="checkbox" id="lineBreak"> 
            <label for="lineBreak">每行独立显示</label>
        </div>
    </div>

    <!-- 示例按钮 -->
    <button onclick="showExample()">查看示例JSON</button>

    <!-- 下载按钮 -->
    <div>
        <button onclick="downloadTxt()">下载TXT</button>
        <button onclick="downloadSubtitle()">下载字幕</button>
    </div>

    <!-- Bilibili链接输入 -->
    <div>
        <input type="text" id="bilibiliUrl" placeholder="输入Bilibili视频链接">
        <button onclick="getBilibiliSubtitle()">获取字幕</button>
    </div>
</div>

<!-- 示例模态框 -->
<div id="exampleModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeExample()">&times;</span>
        <pre id="exampleContent">
{
  "body": [
    {"from":0,"to":2,"content":"欢迎来到"},
    {"from":2,"to":4,"content":"示例字幕"}
  ]
}
        </pre>
    </div>
</div>

<script>
// 显示示例JSON
function showExample() {
    const modal = document.getElementById("exampleModal");
    const span = document.getElementsByClassName("close")[0];
    modal.style.display = "block";
    
    span.onclick = function() {
        modal.style.display = "none";
    }
    
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
}

// 关闭示例模态框
function closeExample() {
    document.getElementById("exampleModal").style.display = "none";
}

// 处理文件上传
document.getElementById('jsonUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const json = JSON.parse(e.target.result);
            displaySubtitles(json.body);
        } catch(err) {
            alert('无效的JSON文件');
        }
    };
    
    reader.readAsText(file);
});

// 显示字幕内容
function displaySubtitles(subtitles) {
    let content = '';
    subtitles.forEach(sub => {
        content += sub.content;
        if (document.getElementById('lineBreak').checked) {
            content += '\n';
        } else {
            content += ' ';
        }
    });
    document.getElementById('subtitleDisplay').value = content;
}

// 下载TXT文件
function downloadTxt() {
    const content = document.getElementById('subtitleDisplay').value;
    const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
    saveAs(blob, "subtitles.txt");
}

// 下载字幕文件（需配合后端实现）
function downloadSubtitle() {
    alert('此功能需要后端支持，请联系开发者获取完整版');
}

// 获取Bilibili字幕（演示版本）
function getBilibiliSubtitle() {
    const url = document.getElementById('bilibiliUrl').value;
    const bvid = url.split('BV')[1];
    
    // 模拟API请求（实际使用时需要后端代理）
    fetch(`https://api.bilibili.com/x/player/pagelist?bvid=${bvid}`)
        .then(response => response.json())
        .then(data => {
            const cid = data.data[0].cid;
            alert(`获取到cid: ${cid}\n请使用专用工具下载字幕`);
        })
        .catch(error => console.error('Error:', error));
}

// 文件保存辅助函数
function saveAs(blob, filename) {
    if (window.navigator.msSaveOrOpenBlob) {
        navigator.msSaveBlob(blob, filename);
    } else {
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
}
</script>
</body>
</html>
